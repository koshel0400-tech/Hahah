<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backrooms Multiplayer</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            background-color: #111;
        }
        /* Экран меню */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background: radial-gradient(circle, #2c2c2c 0%, #0a0a0a 100%);
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            color: #f1c40f;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }
        .btn {
            background-color: #333;
            color: #fff;
            border: 2px solid #f1c40f;
            padding: 15px 30px;
            font-size: 1.2rem;
            margin: 10px;
            cursor: pointer;
            border-radius: 5px;
            width: 80%;
            max-width: 300px;
            transition: 0.2s;
            touch-action: manipulation;
        }
        .btn:active {
            background-color: #f1c40f;
            color: #000;
        }
        /* Окно коннекта WebRTC */
        #p2pWindow {
            display: none;
            width: 90%;
            max-width: 400px;
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid #f1c40f;
            padding: 20px;
            border-radius: 10px;
            flex-direction: column;
            gap: 10px;
        }
        textarea {
            width: 100%;
            height: 80px;
            background: #222;
            color: #fff;
            border: 1px solid #555;
            padding: 5px;
            resize: none;
            font-size: 0.8rem;
        }
        /* Мобильный интерфейс поверх игры */
        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            display: none;
        }
        .interactive {
            pointer-events: auto;
        }
        /* Джойстик */
        #joystickZone {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #joystickStick {
            width: 50px;
            height: 50px;
            background: rgba(241, 196, 15, 0.6);
            border-radius: 50%;
            position: absolute;
        }
        /* Стамина бар */
        #staminaBarContainer {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 150px;
            height: 15px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #fff;
            border-radius: 3px;
            overflow: hidden;
        }
        #staminaBar {
            width: 100%;
            height: 100%;
            background: #2ecc71;
            transition: width 0.1s linear;
        }
        /* Кнопки действий справа */
        #actionButtons {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .actionBtn {
            width: 70px;
            height: 70px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #f1c40f;
            border-radius: 50%;
            color: #fff;
            font-size: 0.9rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .actionBtn:active {
            background: rgba(241, 196, 15, 0.6);
            color: #000;
        }
        #runBtn {
            background: rgba(231, 76, 60, 0.4);
            border-color: #e74c3c;
        }
        #runBtn.active {
            background: rgba(231, 76, 60, 0.9);
        }
        /* Инвентарь */
        #inventoryUi {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            background: rgba(0,0,0,0.6);
            padding: 5px;
            border-radius: 5px;
            border: 1px solid #555;
        }
        .invSlot {
            width: 45px;
            height: 45px;
            background: #222;
            border: 2px solid #555;
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.7rem;
            color: #fff;
            position: relative;
        }
        .invSlot.selected {
            border-color: #f1c40f;
            background: #333;
        }
        /* Черный экран */
        #blackout {
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background: #000;
            z-index: 20;
            display: none;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 1.5rem;
        }
        /* Окно мини-игры */
        #minigameUi {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            background: #222;
            border: 3px solid #f1c40f;
            border-radius: 10px;
            padding: 15px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 8;
            color: #fff;
        }
        #minigameGrid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }
        .mgBtn {
            width: 60px;
            height: 60px;
            background: #444;
            border: 1px solid #fff;
            font-size: 1.2rem;
            color: #fff;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>

    <div id="mainMenu" class="screen">
        <h1>BACKROOMS: THE ROOM</h1>
        <button class="btn" onclick="initRole('admin')">Админ (Создать)</button>
        <button class="btn" onclick="initRole('client')">Присоединиться</button>

        <div id="p2pWindow" class="interactive">
            <h3 id="p2pTitle">Настройка подключения</h3>
            <p id="p2pStepText" style="font-size:0.8rem; color:#ccc; margin-bottom:5px;"></p>
            <textarea id="localCode" readonly onclick="this.select()" placeholder="Тут появится ваш код"></textarea>
            <button class="btn" id="copyBtn" style="font-size:0.9rem; padding:8px; margin:5px 0;" onclick="copyLocalCode()">Скопировать код</button>
            <p style="font-size:0.8rem; margin-top:5px;">Вставьте код друга ниже:</p>
            <textarea id="remoteCode" placeholder="Вставьте код сюда..."></textarea>
            <button class="btn" style="font-size:0.9rem; padding:10px; margin:5px 0; background:#27ae60;" onclick="connectPeers()">Подключиться</button>
        </div>
    </div>

    <div id="uiLayer">
        <div id="staminaBarContainer">
            <div id="staminaBar"></div>
        </div>

        <div id="joystickZone" class="interactive">
            <div id="joystickStick"></div>
        </div>

        <div id="actionButtons">
            <button id="runBtn" class="actionBtn interactive" onclick="toggleRun()">БЕГ</button>
            <button id="useBtn" class="actionBtn interactive" onclick="handleUseAction()">ВЗЯТЬ</button>
            <button id="dropBtn" class="actionBtn interactive" onclick="handleDropAction()">ВЫКИНУТЬ</button>
        </div>

        <div id="inventoryUi" class="interactive">
            <div class="invSlot selected" onclick="selectSlot(0)" id="slot0">-</div>
            <div class="invSlot" onclick="selectSlot(1)" id="slot1">-</div>
            <div class="invSlot" onclick="selectSlot(2)" id="slot2">-</div>
            <div class="invSlot" onclick="selectSlot(3)" id="slot3">-</div>
            <div class="invSlot" onclick="selectSlot(4)" id="slot4">-</div>
        </div>
    </div>

    <div id="blackout">ЗАГРУЗКА ЗАКУЛИСЬЯ...</div>

    <div id="minigameUi" class="interactive">
        <h4 style="color:#f1c40f; text-align:center;">Сломайте замок!</h4>
        <p style="font-size:0.7rem; text-align:center; color:#bbb;">Нажимайте на мигающие кнопки вместе с другом!</p>
        <div id="minigameGrid">
            <button class="mgBtn" id="mg0" onclick="pressMinigame(0)">1</button>
            <button class="mgBtn" id="mg1" onclick="pressMinigame(1)">2</button>
            <button class="mgBtn" id="mg2" onclick="pressMinigame(2)">3</button>
            <button class="mgBtn" id="mg3" onclick="pressMinigame(3)">4</button>
            <button class="mgBtn" id="mg4" onclick="pressMinigame(4)">5</button>
            <button class="mgBtn" id="mg5" onclick="pressMinigame(5)">6</button>
            <button class="mgBtn" id="mg6" onclick="pressMinigame(6)">7</button>
            <button class="mgBtn" id="mg7" onclick="pressMinigame(7)">8</button>
            <button class="mgBtn" id="mg8" onclick="pressMinigame(8)">9</button>
        </div>
        <button class="btn" style="font-size:0.8rem; padding:5px; margin:0; width:100px;" onclick="closeMinigameUi()">Выйти</button>
    </div>
</div>

<script>
    // --- Настройки канваса ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // --- Состояния Игры ---
    // Сцены: 'menu', 'intro_home', 'blackout', 'backrooms'
    let currentScene = 'menu'; 
    let myRole = ''; // 'admin' или 'client'

    // Мультиплеер WebRTC (Offer/Answer без сервера)
    let peerConnection;
    let dataChannel;
    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    // --- Данные Кат-сцены ---
    let introTimer = 0;
    let introStage = 0; // 0 - сидит дома, 1 - идет к стене, 2 - стена глючит, 3 - дотронулся

    // --- Данные Игрового мира Backrooms ---
    let mapSize = 2000;
    let blocks = [];
    let items = [];
    let minigames = [];

    // Игроки
    let player = {
        x: 100, y: 100, radius: 18, speed: 2.5, runSpeed: 4.5,
        isRunning: false, stamina: 100, maxStamina: 100,
        color: '#3498db', angle: 0
    };
    let partner = {
        x: 130, y: 100, radius: 18, color: '#e67e22', angle: 0, active: false
    };

    // Камера
    let camera = { x: 0, y: 0 };

    // Мобильное управление (Джойстик)
    let joystick = { active: false, startX: 0, startY: 0, curX: 0, curY: 0, moveX: 0, moveY: 0 };

    // Инвентарь
    let inventory = [null, null, null, null, null];
    let selectedSlotIndex = 0;

    // Активная мини-игра в мире
    let activeMinigameObject = null;
    let minigameState = { active: false, targetBtn: 0, progress: 0 };

    // --- Инициализация Карты Backrooms ---
    function generateMap() {
        blocks = [];
        // Внешние стены
        blocks.push({x: 0, y: 0, w: mapSize, h: 20});
        blocks.push({x: 0, y: 0, w: 20, h: mapSize});
        blocks.push({x: 0, y: mapSize - 20, w: mapSize, h: 20});
        blocks.push({x: mapSize - 20, y: 0, w: 20, h: mapSize});

        // Случайные лабиринты (комнаты закулисья)
        for(let i = 0; i < 25; i++) {
            let w = Math.floor(Math.random() * 150) + 80;
            let h = Math.floor(Math.random() * 150) + 80;
            let x = Math.floor(Math.random() * (mapSize - 300)) + 100;
            let y = Math.floor(Math.random() * (mapSize - 300)) + 100;
            blocks.push({x: x, y: y, w: w, h: h});
        }

        // Спавн предметов (Миндальная вода, Ключи, Фонарики)
        const types = ['Вода', 'Ключ', 'Фонарь', 'Предохранитель'];
        items = [];
        for(let i=0; i<30; i++) {
            let rx = Math.floor(Math.random() * (mapSize - 100)) + 50;
            let ry = Math.floor(Math.random() * (mapSize - 100)) + 50;
            if(!checkWallCollision(rx, ry, 15)) {
                items.push({
                    id: i,
                    x: rx, y: ry,
                    type: types[Math.floor(Math.random() * types.length)],
                    color: '#f1c40f'
                });
            }
        }

        // Спавн Станций Мини-игр (Терминалы/Замки)
        minigames = [];
        for(let i=0; i<5; i++) {
            let mx = Math.floor(Math.random() * (mapSize - 200)) + 100;
            let my = Math.floor(Math.random() * (mapSize - 200)) + 100;
            if(!checkWallCollision(mx, my, 30)) {
                minigames.push({
                    id: i, x: mx, y: my, r: 25, solved: false, color: '#9b59b6'
                });
            }
        }
    }

    function checkWallCollision(x, y, r) {
        for(let b of blocks) {
            let closeX = Math.max(b.x, Math.min(x, b.x + b.w));
            let closeY = Math.max(b.y, Math.min(y, b.y + b.h));
            let distX = x - closeX;
            let distY = y - closeY;
            if((distX * distX + distY * distY) < (r * r)) {
                return true;
            }
        }
        return false;
    }

    // --- Сетевая часть WebRTC (P2P Offer/Answer) ---
    function initRole(role) {
        myRole = role;
        document.getElementById('p2pWindow').style.display = 'flex';
        
        peerConnection = new RTCPeerConnection(rtcConfig);

        peerConnection.onicecandidate = (e) => {
            if (!e.candidate) {
                // Все кандидаты собраны, выводим финальный код
                document.getElementById('localCode').value = btoa(JSON.stringify(peerConnection.localDescription));
            }
        };

        if (role === 'admin') {
            document.getElementById('p2pTitle').innerText = 'Режим: Админ (Создатель)';
            document.getElementById('p2pStepText').innerText = '1. Скопируйте код ниже и отправьте другу.\n2. Вставьте ответный код от друга в нижнее поле.';
            
            dataChannel = peerConnection.createDataChannel("gameChannel");
            setupDataChannel();

            peerConnection.createOffer().then(offer => peerConnection.setLocalDescription(offer));
        } else {
            document.getElementById('p2pTitle').innerText = 'Режим: Присоединиться';
            document.getElementById('p2pStepText').innerText = '1. Вставьте код админа в нижнее поле.\n2. Нажмите Подключиться.\n3. Скопируйте сгенерированный код из верхнего поля и отправьте админу.';
            
            peerConnection.ondatachannel = (e) => {
                dataChannel = e.channel;
                setupDataChannel();
            };
        }
    }

    function copyLocalCode() {
        const text = document.getElementById('localCode');
        text.select();
        document.execCommand('copy');
        alert('Код скопирован в буфер обмена!');
    }

    function connectPeers() {
        const remoteValue = document.getElementById('remoteCode').value.trim();
        if(!remoteValue) return alert('Введите код!');
        
        try {
            const desc = new RTCSessionDescription(JSON.parse(atob(remoteValue)));
            peerConnection.setRemoteDescription(desc).then(() => {
                if (myRole === 'client' && !peerConnection.localDescription) {
                    peerConnection.createAnswer().then(answer => peerConnection.setLocalDescription(answer));
                }
            });
        } catch(err) {
            alert('Ошибка разбора кода. Убедитесь, что скопировали его полностью!');
        }
    }

    function setupDataChannel() {
        dataChannel.onopen = () => {
            // Успешный коннект! Запускаем кат-сцену
            document.getElementById('mainMenu').style.display = 'none';
            startIntro();
        };
        dataChannel.onmessage = (e) => {
            let msg = JSON.parse(e.data);
            handleNetworkMessage(msg);
        };
    }

    function sendNetData(data) {
        if(dataChannel && dataChannel.readyState === 'open') {
            dataChannel.send(JSON.stringify(data));
        }
    }

    // --- Обработка Сетевых Пакетов ---
    function handleNetworkMessage(msg) {
        if(msg.type === 'sync_intro') {
            introStage = msg.stage;
            introTimer = msg.timer;
        }
        if(msg.type === 'sync_pos') {
            partner.x = msg.x;
            partner.y = msg.y;
            partner.angle = msg.angle;
            partner.active = true;
        }
        if(msg.type === 'sync_map') {
            blocks = msg.blocks;
            items = msg.items;
            minigames = msg.minigames;
        }
        if(msg.type === 'item_pickup') {
            items = items.filter(i => i.id !== msg.id);
        }
        if(msg.type === 'item_drop') {
            items.push(msg.item);
        }
        if(msg.type === 'mg_sync') {
            minigameState.targetBtn = msg.targetBtn;
            minigameState.progress = msg.progress;
            updateMinigameUiColors();
            if(msg.solved && activeMinigameObject) {
                let found = minigames.find(m => m.id === activeMinigameObject.id);
                if(found) found.solved = true;
                closeMinigameUi();
            }
        }
    }

    // --- Логика Кат-сцены Дома ---
    function startIntro() {
        currentScene = 'intro_home';
        introStage = 0;
        introTimer = 0;
        generateMap();
        
        // Синхронизация карты от админа к клиенту
        if(myRole === 'admin') {
            setTimeout(() => {
                sendNetData({type: 'sync_map', blocks: blocks, items: items, minigames: minigames});
            }, 1000);
        }
    }

    function updateIntro() {
        introTimer++;
        if(introStage === 0 && introTimer > 120) { 
            introStage = 1; // Персонаж встает и идет к стене
        }
        if(introStage === 1 && introTimer > 260) {
            introStage = 2; // Стена начинает жестко лагать и мигать
        }
        if(introStage === 2 && introTimer > 400) {
            introStage = 3; // Персонаж трогает стену
        }
        if(introStage === 3 && introTimer > 460) {
            // Включаем черный экран провала на 3 секунды
            currentScene = 'blackout';
            document.getElementById('blackout').style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('blackout').style.display = 'none';
                document.getElementById('uiLayer').style.display = 'block';
                currentScene = 'backrooms';
                // Сброс позиций игроков на спавн в Закулисье
                player.x = 100; player.y = 100;
                partner.x = 140; partner.y = 100;
            }, 3000);
        }

        if(myRole === 'admin') {
            sendNetData({type: 'sync_intro', stage: introStage, timer: introTimer});
        }
    }

    // --- Логика Инвентаря ---
    function selectSlot(idx) {
        selectedSlotIndex = idx;
        for(let i=0; i<5; i++) {
            document.getElementById('slot' + i).classList.remove('selected');
        }
        document.getElementById('slot' + idx).classList.add('selected');
    }

    function handleUseAction() {
        // Проверка подбора предмета
        let foundItemIndex = -1;
        for(let i=0; i<items.length; i++) {
            let it = items[i];
            let dx = player.x - it.x;
            let dy = player.y - it.y;
            if(Math.sqrt(dx*dx + dy*dy) < 40) {
                foundItemIndex = i;
                break;
            }
        }

        if(foundItemIndex !== -1) {
            let it = items[foundItemIndex];
            // Ищем свободный слот
            let emptySlot = inventory.findIndex(s => s === null);
            if(emptySlot !== -1) {
                inventory[emptySlot] = it.type;
                document.getElementById('slot' + emptySlot).innerText = it.type;
                sendNetData({type: 'item_pickup', id: it.id});
                items.splice(foundItemIndex, 1);
                return;
            } else {
                alert('Инвентарь полон!');
                return;
            }
        }

        // Проверка активации Мини-игры
        for(let mg of minigames) {
            if(mg.solved) continue;
            let dx = player.x - mg.x;
            let dy = player.y - mg.y;
            if(Math.sqrt(dx*dx + dy*dy) < 50) {
                openMinigameUi(mg);
                return;
            }
        }
    }

    function handleDropAction() {
        let itemType = inventory[selectedSlotIndex];
        if(!itemType) return;

        let droppedItem = {
            id: Date.now(),
            x: player.x + Math.cos(player.angle)*30,
            y: player.y + Math.sin(player.angle)*30,
            type: itemType,
            color: '#f1c40f'
        };

        // Проверяем, чтобы вещь не упала сквозь стену
        if(!checkWallCollision(droppedItem.x, droppedItem.y, 10)) {
            inventory[selectedSlotIndex] = null;
            document.getElementById('slot' + selectedSlotIndex).innerText = '-';
            items.push(droppedItem);
            sendNetData({type: 'item_drop', item: droppedItem});
        }
    }

    // --- Логика Бега и Стамины ---
    function toggleRun() {
        if(player.stamina > 10) {
            player.isRunning = !player.isRunning;
            document.getElementById('runBtn').classList.toggle('active', player.isRunning);
        }
    }

    // --- Логика Мини-игры Вдвоем ---
    function openMinigameUi(mgObject) {
        activeMinigameObject = mgObject;
        minigameState.active = true;
        minigameState.progress = 0;
        if(myRole === 'admin') {
            minigameState.targetBtn = Math.floor(Math.random() * 9);
        }
        document.getElementById('minigameUi').style.display = 'flex';
        updateMinigameUiColors();
    }

    function closeMinigameUi() {
        minigameState.active = false;
        activeMinigameObject = null;
        document.getElementById('minigameUi').style.display = 'none';
    }

    function updateMinigameUiColors() {
        for(let i=0; i<9; i++) {
            let btn = document.getElementById('mg' + i);
            if(i === minigameState.targetBtn) {
                btn.style.backgroundColor = '#f1c40f'; // Целевая мигающая кнопка
                btn.style.color = '#000';
            } else {
                btn.style.backgroundColor = '#444';
                btn.style.color = '#fff';
            }
        }
    }

    function pressMinigame(btnIdx) {
        if(!minigameState.active) return;
        if(btnIdx === minigameState.targetBtn) {
            minigameState.progress += 10;
            if(minigameState.progress >= 100) {
                // Мини-игра пройдена!
                let found = minigames.find(m => m.id === activeMinigameObject.id);
                if(found) found.solved = true;
                sendNetData({type: 'mg_sync', targetBtn: 0, progress: 100, solved: true});
                closeMinigameUi();
                alert('Электронный замок взломан!');
            } else {
                // Новая случайная кнопка генерируется админом
                if(myRole === 'admin') {
                    minigameState.targetBtn = Math.floor(Math.random() * 9);
                    sendNetData({type: 'mg_sync', targetBtn: minigameState.targetBtn, progress: minigameState.progress, solved: false});
                    updateMinigameUiColors();
                } else {
                    // Клиент просит админа обновить шаг
                    sendNetData({type: 'mg_sync', targetBtn: minigameState.targetBtn, progress: minigameState.progress, solved: false});
                }
            }
        }
    }

    // --- Обработка Тач-Событий Мобильного Джойстика ---
    const joyZone = document.getElementById('joystickZone');
    const joyStick = document.getElementById('joystickStick');

    joyZone.addEventListener('touchstart', (e) => {
        let t = e.touches[0];
        joystick.active = true;
        let rect = joyZone.getBoundingClientRect();
        joystick.startX = rect.left + rect.width/2;
        joystick.startY = rect.top + rect.height/2;
    }, {passive: true});

    joyZone.addEventListener('touchmove', (e) => {
        if(!joystick.active) return;
        let t = e.touches[0];
        let dx = t.clientX - joystick.startX;
        let dy = t.clientY - joystick.startY;
        let dist = Math.sqrt(dx*dx + dy*dy);
        let maxDist = 50;

        if(dist > maxDist) {
            dx = (dx / dist) * maxDist;
            dy = (dy / dist) * maxDist;
        }

        joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
        
        // Нормализация вектора движения от -1 до 1
        joystick.moveX = dx / maxDist;
        joystick.moveY = dy / maxDist;
    }, {passive: true});

    joyZone.addEventListener('touchend', () => {
        joystick.active = false;
        joystick.moveX = 0;
        joystick.moveY = 0;
        joyStick.style.transform = 'translate(0px, 0px)';
    }, {passive: true});


    // --- Основной Игровой Движок (Цикл) ---
    function gameLoop() {
        update();
        render();
        requestAnimationFrame(gameLoop);
    }

    function update() {
        if (currentScene === 'intro_home') {
            updateIntro();
        }

        if (currentScene === 'backrooms') {
            // Рассчет скорости (Бег / Ходьба)
            let speed = player.speed;
            if(player.isRunning && player.stamina > 0 && (joystick.moveX !== 0 || joystick.moveY !== 0)) {
                speed = player.runSpeed;
                player.stamina -= 0.3;
                if(player.stamina <= 0) {
                    player.stamina = 0;
                    player.isRunning = false;
                    document.getElementById('runBtn').classList.remove('active');
                }
            } else {
                if(player.stamina < player.maxStamina) player.stamina += 0.15;
            }
            document.getElementById('staminaBar').style.width = player.stamina + '%';

            // Перемещение персонажа по осям с проверкой коллизий
            let nextX = player.x + joystick.moveX * speed;
            let nextY = player.y + joystick.moveY * speed;

            if(!checkWallCollision(nextX, player.y, player.radius)) {
                player.x = nextX;
            }
            if(!checkWallCollision(player.x, nextY, player.radius)) {
                player.y = nextY;
            }

            // Угол поворота персонажа
            if(joystick.moveX !== 0 || joystick.moveY !== 0) {
                player.angle = Math.atan2(joystick.moveY, joystick.moveX);
            }

            // Камера плавно следует за игроком
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;

            // Отправка координат напарнику
            sendNetData({
                type: 'sync_pos',
                x: player.x,
                y: player.y,
                angle: player.angle
            });
        }
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (currentScene === 'intro_home') {
            renderIntroScene();
        }

        if (currentScene === 'backrooms') {
            renderBackroomsScene();
        }
    }

    // --- Отрисовка Кат-сцены Дома ---
    function renderIntroScene() {
        // Комната дома
        ctx.fillStyle = '#4a3728';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Обои
        ctx.fillStyle = '#6d5542';
        ctx.fillRect(50, 50, canvas.width - 100, canvas.height - 100);

        // Правая стена, которая заглючит
        if(introStage >= 2 && Math.floor(Date.now() / 100) % 2 === 0) {
            ctx.fillStyle = '#f1c40f'; // Желтый цвет закулисья пробивается сквозь глюк
        } else {
            ctx.fillStyle = '#2c3e50';
        }
        let wallX = canvas.width - 120;
        ctx.fillRect(wallX, 50, 40, canvas.height - 100);

        // Диван / Стул
        ctx.fillStyle = '#7f8c8d';
        ctx.fillRect(200, canvas.height / 2 - 30, 60, 60);

        // Координаты персонажа в анимации
        let px = 230;
        let py = canvas.height / 2;

        if(introStage === 1 || introStage === 2) {
            let progress = (introTimer - 120) / 280; 
            px = 230 + (wallX - 260) * Math.min(progress, 1);
        }
        if(introStage === 3) {
            px = wallX - 30;
        }

        // Красивая 2D модель игрока со спины
        ctx.save();
        ctx.translate(px, py);
        
        // Руки / Плечи
        ctx.fillStyle = '#2980b9';
        ctx.fillRect(-18, -12, 36, 24);
        // Голова
        ctx.fillStyle = '#ffdbac';
        ctx.beginPath();
        ctx.arc(0, 0, 12, 0, Math.PI*2);
        ctx.fill();
        // Волосы
        ctx.fillStyle = '#2c3e50';
        ctx.fillRect(-10, -12, 20, 8);
        
        ctx.restore();

        // Подсказки сюжета текстом
        ctx.fillStyle = '#fff';
        ctx.font = '16px Courier New';
        ctx.textAlign = 'center';
        if(introStage === 0) ctx.fillText('Ты отдыхаешь дома после тяжелого дня...', canvas.width/2, canvas.height - 80);
        if(introStage === 2) ctx.fillText('Что происходит со стеной?..', canvas.width/2, canvas.height - 80);
        if(introStage === 3) ctx.fillText('Кажется, она нематериальна...', canvas.width/2, canvas.height - 80);
    }

    // --- Отрисовка Мира Backrooms ---
    function renderBackroomsScene() {
        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        // Рендер пола Backrooms (Желтый страшный ковер)
        ctx.fillStyle = '#d5c48f';
        ctx.fillRect(0, 0, mapSize, mapSize);

        // Сетка ковра для текстурности
        ctx.strokeStyle = '#c6b37b';
        ctx.lineWidth = 1;
        for(let i=0; i<mapSize; i+=40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, mapSize); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(mapSize, i); ctx.stroke();
        }

        // Отрисовка Станций Мини-игр
        for(let mg of minigames) {
            ctx.beginPath();
            ctx.arc(mg.x, mg.y, mg.r, 0, Math.PI*2);
            ctx.fillStyle = mg.solved ? '#2ecc71' : mg.color;
            ctx.fill();
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#fff';
            ctx.stroke();
            
            // Текст над мини-игрой
            ctx.fillStyle = '#fff';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(mg.solved ? 'ВЗЛОМАНО' : 'ЗАМОК (КЛИК)', mg.x, mg.y - 32);
        }

        // Отрисовка предметов на полу
        for(let it of items) {
            ctx.beginPath();
            ctx.arc(it.x, it.y, 10, 0, Math.PI*2);
            ctx.fillStyle = it.color;
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.font = '9px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(it.type[0], it.x, it.y + 3);

            // Метка имени предмета сверху
            ctx.fillStyle = '#fff';
            ctx.font = '11px Courier New';
            ctx.fillText(it.type, it.x, it.y - 14);
        }

        // Отрисовка Стен лабиринта
        ctx.fillStyle = '#8a7946'; // Цвет стен сверху
        for(let b of blocks) {
            ctx.fillRect(b.x, b.y, b.w, b.h);
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#574d2c';
            ctx.strokeRect(b.x, b.y, b.w, b.h);
        }

        // Рендер Напарника (Друга)
        if(partner.active) {
            drawPlayerModel(partner.x, partner.y, partner.angle, partner.color, 'Друг');
        }

        // Рендер Меня (Главного Игрока)
        drawPlayerModel(player.x, player.y, player.angle, player.color, 'Вы');

        ctx.restore();
    }

    // Универсальная отрисовка красивой 2D топ-даун модели персонажа
    function drawPlayerModel(x, y, angle, color, name) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);

        // Руки / Плечи экипировки
        ctx.fillStyle = '#2c3e50';
        ctx.fillRect(-10, -22, 16, 8);
        ctx.fillRect(-10, 14, 16, 8);

        // Тело (Куртка костюма химзащиты)
        ctx.beginPath();
        ctx.arc(0, 0, 16, 0, Math.PI*2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#111';
        ctx.stroke();

        // Маска / Капюшон
        ctx.beginPath();
        ctx.arc(4, 0, 9, 0, Math.PI*2);
        ctx.fillStyle = '#222';
        ctx.fill();

        // Стекло противогаза / визор
        ctx.fillStyle = '#00d2ff';
        ctx.fillRect(8, -5, 3, 10);

        ctx.restore();

        // Никнейм над головой (вне ротации матрицы)
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText(name, x, y - 26);
    }

    // Запуск цикла игры
    gameLoop();

</script>
